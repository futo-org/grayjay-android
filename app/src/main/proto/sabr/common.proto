syntax = "proto3";

package sabr;

option java_package = "com.futo.platformplayer.sabr.proto";
option java_multiple_files = true;

message FormatId {
  int32 itag = 1;
  uint64 lmt = 2;
  string xtags = 3;
}

message TimeRange {
  int64 start_ticks = 1;
  int64 duration_ticks = 2;
  int32 timescale = 3;
}

message ByteRange {
  int64 start = 1;
  int64 end = 2;
}
